<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>XkyLog Debugger</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      padding: 16px;
      background: #111;
      color: white;
      font-size: 20px;
    }

    .container {
      padding: 16px;
      max-width: 1200px;
      margin: auto;
    }

    textarea, input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      font-family: monospace;
    }

    button {
      padding: 10px 14px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .error { color: red; }
    .slow { color: orange; }
    .ok { color: green; }

    pre {
      background: #eee;
      padding: 10px;
      overflow-x: auto;
    }
  </style>
</head>

<body>

<header>XkyLog Debugger</header>

<div class="container">

  <textarea id="input" rows="10" placeholder="Paste logs here..."></textarea>
  <button onclick="parseLogs()">Parse Logs</button>

  <input id="search" placeholder="Search logs..." oninput="render()" />

  <div id="stats"></div>
  <div id="output"></div>

</div>

<script>
let logs = [];

function extractJSON(text) {
  const matches = [];
  let stack = 0, start = -1;

  for (let i = 0; i < text.length; i++) {
    if (text[i] === '{') {
      if (stack === 0) start = i;
      stack++;
    } else if (text[i] === '}') {
      stack--;
      if (stack === 0 && start !== -1) {
        matches.push(text.slice(start, i + 1));
        start = -1;
      }
    }
  }

  return matches;
}

/* ===================== PARSE ===================== */

function parseLogs() {
  const input = document.getElementById("input").value;
  const lines = input.split("\n").filter(Boolean);

  logs = lines.map((line, i) => {
    const time = (line.match(/time="([^"]+)"/) || [])[1] || "";
    const msg = (line.match(/msg="([^"]+)"/) || [])[1] || "";
    const status = (line.match(/status="([^"]+)"/) || [])[1] || "";
    const latency = parseFloat((line.match(/latency=([^ ]+)/) || [])[1] || "0");

    let type = "other";
    if (msg.toLowerCase().includes("request")) type = "request";
    if (msg.toLowerCase().includes("response")) type = "response";

    let health = "ok";
    if (status && !status.startsWith("200")) health = "error";
    if (latency > 500) health = "slow";

    return {
      id: i,
      time,
      msg,
      status,
      latency,
      type,
      health,
      json: extractJSON(line).map(parseJSONSafe)
    };
  });

  render();
}

function parseJSONSafe(str) {
  try {
    return JSON.parse(str);
  } catch {
    return str;
  }
}

/* ===================== JSON TREE ===================== */

function renderJSONTree(obj) {
  if (obj === null) return `<span class="null">null</span>`;
  if (typeof obj !== "object") return formatValue(obj);

  const id = Math.random().toString(36).slice(2);

  let html = `<div>`;
  html += `<span style="cursor:pointer;color:#6366f1" onclick="toggle('${id}')">▶ Object</span>`;
  html += `<div id="${id}" style="display:none;margin-left:15px;">`;

  for (const k in obj) {
    html += `
      <div>
        <span class="key">"${k}"</span>: ${renderJSONTree(obj[k])}
      </div>
    `;
  }

  html += `</div></div>`;
  return html;
}

function toggle(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

/* ===================== SYNTAX HIGHLIGHT ===================== */

function formatValue(v) {
  if (typeof v === "string") return `<span class="string">"${v}"</span>`;
  if (typeof v === "number") return `<span class="number">${v}</span>`;
  if (typeof v === "boolean") return `<span class="boolean">${v}</span>`;
  return v;
}

/* ===================== COPY ===================== */

function copyJSON(obj) {
  navigator.clipboard.writeText(JSON.stringify(obj, null, 2));
}

/* ===================== DIFF VIEW ===================== */

function renderDiff(a, b) {
  return `
    <div style="display:flex;gap:10px;">
      <div style="flex:1;background:#0f172a;color:white;padding:10px;">
        <b>REQUEST</b>
        <pre>${JSON.stringify(a, null, 2)}</pre>
      </div>
      <div style="flex:1;background:#111827;color:white;padding:10px;">
        <b>RESPONSE</b>
        <pre>${JSON.stringify(b, null, 2)}</pre>
      </div>
    </div>
  `;
}

/* ===================== RENDER ===================== */

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const output = document.getElementById("output");

  const filtered = logs.filter(l =>
    JSON.stringify(l).toLowerCase().includes(q)
  );

  const requests = filtered.filter(l => l.type === "request");
  const responses = filtered.filter(l => l.type === "response");

  document.getElementById("stats").innerHTML = `
    <div class="card">
      Total: ${logs.length} |
      Requests: ${requests.length} |
      Responses: ${responses.length}
    </div>
  `;

  output.innerHTML = filtered.map(l => `
    <div class="card">

      <div>
        <b>${l.time}</b> - ${l.msg}
      </div>

      <div>
        Type: <b>${l.type}</b> |
        Status: ${l.status} |
        Latency: ${l.latency}ms
      </div>

      <div class="${l.health}">
        <b>${l.health.toUpperCase()}</b>
      </div>

      ${l.json.map(j => `
        <div style="margin-top:10px">

          <button onclick='copyJSON(${JSON.stringify(j)})'>
            Copy JSON
          </button>

          <div style="margin-top:10px;padding:10px;background:#f5f5f5;border-radius:6px">
            ${renderJSONTree(j)}
          </div>

        </div>
      `).join("")}

    </div>
  `).join("");

  /* OPTIONAL: auto diff view if request/response pairs exist */
  if (requests.length && responses.length) {
    output.innerHTML += `
      <div class="card">
        <h3>Request vs Response Diff</h3>
        ${renderDiff(requests[0], responses[0])}
      </div>
    `;
  }
}
</script>

</body>
</html>
