<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>XkyLog Debugger</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      padding: 16px;
      background: #111;
      color: white;
      font-size: 20px;
    }

    .container {
      padding: 16px;
      max-width: 1200px;
      margin: auto;
    }

    textarea, input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      font-family: monospace;
    }

    button {
      padding: 10px 14px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .error { color: red; }
    .slow { color: orange; }
    .ok { color: green; }

    pre {
      background: #eee;
      padding: 10px;
      overflow-x: auto;
    }

    mark {
  background: yellow;
  padding: 2px;
  border-radius: 3px;
}

.key { color: #7c3aed; }
.string { color: #16a34a; }
.number { color: #f59e0b; }
.boolean { color: #2563eb; }
.null { color: #dc2626; }
    
  </style>
</head>

<body>

<header>XkyLog Debugger</header>

<div class="container">

  <textarea id="input" rows="10" placeholder="Paste logs here..."></textarea>
  <button onclick="parseLogs()">Parse Logs</button>

  <input id="search" placeholder="Search logs..." oninput="render()" />

  <div id="stats"></div>
  <div id="output"></div>

</div>

<script>
let logs = [];
let collapsedGroups = new Set();

/* ===================== EXTRACT JSON ===================== */

function extractJSON(text) {
  const matches = [];
  let stack = 0, start = -1;

  for (let i = 0; i < text.length; i++) {
    if (text[i] === '{') {
      if (stack === 0) start = i;
      stack++;
    } else if (text[i] === '}') {
      stack--;
      if (stack === 0 && start !== -1) {
        matches.push(text.slice(start, i + 1));
        start = -1;
      }
    }
  }
  return matches;
}

/* ===================== SAFE JSON ===================== */

function parseJSONSafe(str) {
  try {
    return JSON.parse(str);
  } catch {
    return str;
  }
}

/* ===================== PARSE LOGS ===================== */

function parseLogs() {
  const input = document.getElementById("input").value;
  const lines = input.split("\n").filter(Boolean);

  logs = lines.map((line, i) => {
    const time = (line.match(/time="([^"]+)"/) || [])[1] || "";
    const msg = (line.match(/msg="([^"]+)"/) || [])[1] || "";
    const status = (line.match(/status="([^"]+)"/) || [])[1] || "";
    const latency = parseFloat((line.match(/latency=([^ ]+)/) || [])[1] || "0");
    const id = (line.match(/id=([^ ]+)/) || [])[1] || "";

    let type = "other";
    if (msg.toLowerCase().includes("request")) type = "request";
    if (msg.toLowerCase().includes("response")) type = "response";

    let health = "ok";
    if (status && !status.startsWith("200")) health = "error";
    if (latency > 500) health = "slow";

    return {
      id: id || i,
      time,
      msg,
      status,
      latency,
      type,
      health,
      json: extractJSON(line).map(parseJSONSafe)
    };
  });

  render();
}

/* ===================== SEARCH HIGHLIGHT ===================== */

function highlight(text, query) {
  if (!query) return text;
  const regex = new RegExp(`(${query})`, "gi");
  return text.replace(regex, `<mark>$1</mark>`);
}

/* ===================== JSON TREE ===================== */

function renderJSONTree(obj, query = "") {
  if (obj === null) return `<span class="null">null</span>`;
  if (typeof obj !== "object") {
    return highlight(formatValue(obj), query);
  }

  const id = Math.random().toString(36).slice(2);

  let html = `
    <div>
      <span style="cursor:pointer;color:#6366f1" onclick="toggle('${id}')">
        ▶ Object
      </span>
      <div id="${id}" style="display:none;margin-left:15px;">
  `;

  for (const k in obj) {
    html += `
      <div>
        <span class="key">${highlight('"' + k + '"', query)}</span>:
        ${renderJSONTree(obj[k], query)}
      </div>
    `;
  }

  html += `</div></div>`;
  return html;
}

function toggle(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

/* ===================== FORMAT VALUE ===================== */

function formatValue(v) {
  if (typeof v === "string") return `<span class="string">"${v}"</span>`;
  if (typeof v === "number") return `<span class="number">${v}</span>`;
  if (typeof v === "boolean") return `<span class="boolean">${v}</span>`;
  return v;
}

/* ===================== COPY JSON ===================== */

function copyJSON(obj) {
  navigator.clipboard.writeText(JSON.stringify(obj, null, 2));
}

/* ===================== GROUP TOGGLE ===================== */

function toggleGroup(id) {
  if (collapsedGroups.has(id)) {
    collapsedGroups.delete(id);
  } else {
    collapsedGroups.add(id);
  }
  render();
}

/* ===================== RENDER ===================== */

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const output = document.getElementById("output");

  const filtered = logs.filter(l =>
    JSON.stringify(l).toLowerCase().includes(q)
  );

  const grouped = {};
  filtered.forEach(l => {
    const key = l.id || "ungrouped";
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(l);
  });

  const requests = filtered.filter(l => l.type === "request");
  const responses = filtered.filter(l => l.type === "response");

  document.getElementById("stats").innerHTML = `
    <div class="card">
      Total: ${logs.length} |
      Requests: ${requests.length} |
      Responses: ${responses.length}
    </div>
  `;

  output.innerHTML = Object.entries(grouped).map(([groupId, items]) => {

    const isCollapsed = collapsedGroups.has(groupId);

    return `
      <div class="card">

        <div style="display:flex;justify-content:space-between;align-items:center;">
          <b>Group: ${groupId}</b>

          <button onclick="toggleGroup('${groupId}')">
            ${isCollapsed ? "Expand" : "Collapse"}
          </button>
        </div>

        ${isCollapsed ? "" : `
          ${items.map(l => `
            <div style="margin-top:10px;padding:10px;border-left:3px solid #ddd">

              <div>
                <b>${highlight(l.time, q)}</b> - ${highlight(l.msg, q)}
              </div>

              <div>
                Type: <b>${l.type}</b> |
                Status: ${l.status} |
                Latency: ${l.latency}ms
              </div>

              <div class="${l.health}">
                <b>${l.health.toUpperCase()}</b>
              </div>

              ${l.json.map(j => `
                <div style="margin-top:10px">

                  <button onclick='copyJSON(${JSON.stringify(j)})'>
                    Copy JSON
                  </button>

                  <div style="margin-top:10px;padding:10px;background:#f5f5f5;border-radius:6px">
                    ${renderJSONTree(j, q)}
                  </div>

                </div>
              `).join("")}

            </div>
          `).join("")}
        `}

      </div>
    `;
  }).join("");
}
</script>

</body>
</html>
