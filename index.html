<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>XkyLog Debugger</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0b1220;
  color: #e5e7eb;
}

header {
  padding: 16px;
  background: #111827;
  font-size: 18px;
  font-weight: bold;
}

.container {
  padding: 16px;
  max-width: 1200px;
  margin: auto;
}

textarea, input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  font-family: monospace;
  background: #111827;
  color: white;
  border: 1px solid #374151;
}

button {
  padding: 10px;
  background: #2563eb;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

.card {
  background: #111827;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #1f2937;
}

.meta {
  font-size: 12px;
  color: #9ca3af;
}

/* JSON styles */
.key { color: #a78bfa; }
.string { color: #34d399; }
.number { color: #fbbf24; }
.boolean { color: #60a5fa; }
.null { color: #ef4444; }

pre {
  margin: 0;
  white-space: pre-wrap;
}

  .footer {
  text-align: center;
  padding: 16px;
  margin-top: 20px;
  font-size: 12px;
  color: #6b7280;
  border-top: 1px solid #1f2937;
  background: #0b1220;
  }
</style>

</head>

<body>

<header>XkyLog Debugger</header>

<div class="container">

<textarea id="input" rows="10" placeholder="Paste logs here..."></textarea>
<button onclick="parseLogs()">Parse Logs</button>

<input id="search" placeholder="Search..." oninput="render()" />

<div id="stats"></div>
<div id="output"></div>

</div>

<script>

let logs = [];
let groupedLogs = [];

/* ------------------ UTILS ------------------ */
function escapeHTML(str) {
  return str.replace(/[&<>"']/g, m => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
  }[m]));
}

function highlight(text, q) {
  if (!q) return text;
  const regex = new RegExp(`(${q})`, "gi");
  return text.replace(regex, `<mark style="background:#facc15;color:black">$1</mark>`);
}

function copyJSON(data) {
  navigator.clipboard.writeText(JSON.stringify(data, null, 2));
}

/* ------------------ LATENCY COLOR ------------------ */
function latencyColor(ms) {
  if (ms < 200) return "#22c55e";   // fast
  if (ms < 800) return "#eab308";   // medium
  return "#ef4444";                 // slow
}

/* ------------------ METHOD ------------------ */
function detectMethod(line) {
  const methods = ["GET", "POST", "PUT", "DELETE", "PATCH"];
  for (let m of methods) {
    if (line.toUpperCase().includes(m)) return m;
  }
  return "UNKNOWN";
}

/* ------------------ JSON PARSE ------------------ */
function safeParseJSON(str) {
  try { return JSON.parse(str); }
  catch {
    try { return JSON.parse(str.replace(/\\"/g, '"')); }
    catch { return null; }
  }
}

function extractJSON(text) {
  const results = [];
  let depth = 0, start = -1;

  for (let i = 0; i < text.length; i++) {
    if (text[i] === '{') {
      if (depth === 0) start = i;
      depth++;
    } else if (text[i] === '}') {
      depth--;
      if (depth === 0 && start !== -1) {
        results.push(text.slice(start, i + 1));
      }
    }
  }
  return results;
}

/* ------------------ COLLAPSIBLE JSON ------------------ */
function renderJSON(obj, q) {
  if (obj === null) return `<span class="null">null</span>`;

  if (typeof obj !== "object") {
    let val = highlight(escapeHTML(String(obj)), q);
    if (typeof obj === "string") return `<span class="string">"${val}"</span>`;
    if (typeof obj === "number") return `<span class="number">${val}</span>`;
    if (typeof obj === "boolean") return `<span class="boolean">${val}</span>`;
    return val;
  }

  const id = Math.random().toString(36).slice(2);

  let inner = Object.entries(obj).map(([k, v]) => `
    <div>
      <span class="key">"${highlight(escapeHTML(k), q)}"</span>: ${renderJSON(v, q)}
    </div>
  `).join("");

  return `
    <div>
      <span onclick="toggle('${id}')" style="cursor:pointer;color:#60a5fa">
        ▶
      </span>
      <span>{...}</span>
      <div id="${id}" style="display:none;padding-left:15px">
        ${inner}
      </div>
    </div>
  `;
}

function toggle(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

/* ------------------ GROUP REQUEST/RESPONSE ------------------ */
function groupLogs() {
  groupedLogs = [];
  let current = null;

  for (let log of logs) {
    if (log.type === "request") {
      if (current) groupedLogs.push(current);
      current = { request: log, response: null };
    } else if (log.type === "response" && current) {
      current.response = log;
      groupedLogs.push(current);
      current = null;
    }
  }

  if (current) groupedLogs.push(current);
}

/* ------------------ PARSE ------------------ */
function parseLogs() {
  const lines = document.getElementById("input").value.split("\n").filter(Boolean);

  logs = lines.map((line, i) => {
    const time = (line.match(/time="([^"]+)"/) || [])[1] || "";
    const msg = (line.match(/msg="([^"]+)"/) || [])[1] || "";
    const status = (line.match(/status="?([^" ]+)"?/) || [])[1] || "";
    const latency = parseFloat((line.match(/latency=([^ ]+)/) || [])[1] || "0");

    let type = "other";
    if (msg.includes("request")) type = "request";
    if (msg.includes("response")) type = "response";

    const method = detectMethod(line);

    const jsonBlocks = extractJSON(line)
      .map(safeParseJSON)
      .filter(Boolean);

    return {
      id: i,
      raw: line,
      time,
      msg,
      status,
      latency,
      type,
      method,
      json: jsonBlocks
    };
  });

  groupLogs();
  render();
}

/* ------------------ RENDER ------------------ */
function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const output = document.getElementById("output");

  document.getElementById("stats").innerHTML = `
    <div class="card">
      Total Logs: ${logs.length} |
      Transactions: ${groupedLogs.length}
    </div>
  `;

  output.innerHTML = groupedLogs.map(pair => `
    <div class="card">

      <!-- REQUEST -->
      <div>
        <strong style="color:#3b82f6">REQUEST</strong>
        <div class="meta">
          ${pair.request.time} |
          ${pair.request.method}
        </div>
        <div>${highlight(escapeHTML(pair.request.msg), q)}</div>

        ${pair.request.json.map(j => `
          <div style="margin-top:8px;background:#0f172a;padding:10px;border-radius:6px;position:relative">
            <button onclick='copyJSON(${JSON.stringify(j)})'
              style="position:absolute;top:5px;right:5px;font-size:11px">Copy</button>
            ${renderJSON(j, q)}
          </div>
        `).join("")}
      </div>

      <!-- RESPONSE -->
      ${pair.response ? `
      <div style="margin-top:10px">
        <strong style="color:#22c55e">RESPONSE</strong>
        <div class="meta">
          ${pair.response.time} |
          <span style="color:${latencyColor(pair.response.latency)}">
            ${pair.response.latency}ms
          </span> |
          ${pair.response.status}
        </div>

        <div>${highlight(escapeHTML(pair.response.msg), q)}</div>

        ${pair.response.json.map(j => `
          <div style="margin-top:8px;background:#0f172a;padding:10px;border-radius:6px;position:relative">
            <button onclick='copyJSON(${JSON.stringify(j)})'
              style="position:absolute;top:5px;right:5px;font-size:11px">Copy</button>
            ${renderJSON(j, q)}
          </div>
        `).join("")}
      </div>
      ` : ""}

    </div>
  `).join("");
}

</script>
  <footer class="footer">
  Built by <strong>Tegar Ibrahim</strong> — xkyrage · xkylog-debugger © 2026
  </footer>
</body>
</html>
