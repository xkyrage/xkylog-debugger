<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>XkyLog Debugger</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

header {
  padding: 16px;
  background: #111;
  color: white;
  font-size: 20px;
}

.container {
  padding: 16px;
  max-width: 1200px;
  margin: auto;
}

textarea, input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  font-family: monospace;
}

button {
  padding: 6px 10px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
  margin-top: 5px;
}

.card {
  background: white;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

.error { color: red; }
.slow { color: orange; }
.ok { color: green; }

mark {
  background: yellow;
  padding: 2px;
  border-radius: 3px;
}

/* JSON styling */
.key { color: #7c3aed; }
.string { color: #16a34a; }
.number { color: #f59e0b; }
.boolean { color: #2563eb; }
.null { color: #dc2626; }

pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px;
  border-radius: 6px;
  overflow-x: auto;
}
</style>

</head>

<body>

<header>XkyLog Debugger</header>

<div class="container">

<textarea id="input" rows="10" placeholder="Paste logs here..."></textarea>
<button onclick="parseLogs()">Parse Logs</button>

<input id="search" placeholder="Search logs..." oninput="render()" />

<div id="stats"></div>
<div id="output"></div>

</div>

<script>

let logs = [];
let collapsedGroups = new Set();

/* ===================== EXTRACT JSON ===================== */

function extractJSON(text) {
  const matches = [];
  let stack = 0, start = -1;

  for (let i = 0; i < text.length; i++) {
    if (text[i] === '{') {
      if (stack === 0) start = i;
      stack++;
    } else if (text[i] === '}') {
      stack--;
      if (stack === 0 && start !== -1) {
        matches.push(text.slice(start, i + 1));
        start = -1;
      }
    }
  }
  return matches;
}

/* ===================== SAFE JSON ===================== */

function parseSafeJSON(str) {
  try {
    return JSON.parse(str);
  } catch {
    return str;
  }
}

/* ===================== COPY FIXED ===================== */

function copyJSONFromLog(logId, jsonIndex) {
  const log = logs.find(l => l.id === logId);
  if (!log) return;

  const obj = log.json[jsonIndex];
  const clean = typeof obj === "string" ? JSON.parse(obj) : obj;

  navigator.clipboard.writeText(JSON.stringify(clean, null, 2));
}

/* ===================== TOGGLE GROUP ===================== */

function toggleGroup(id) {
  if (collapsedGroups.has(id)) collapsedGroups.delete(id);
  else collapsedGroups.add(id);

  render();
}

/* ===================== JSON TREE ===================== */

function renderJSONTree(obj, q = "") {
  if (obj === null) return `<span class="null">null</span>`;
  if (typeof obj !== "object") return formatValue(obj, q);

  const id = Math.random().toString(36).slice(2);

  let html = `
    <div>
      <span style="cursor:pointer;color:#6366f1" onclick="toggle('${id}')">▶ Object</span>
      <div id="${id}" style="display:none;margin-left:15px;">
  `;

  for (const k in obj) {
    html += `
      <div>
        <span class="key">${highlight(k, q)}</span>:
        ${renderJSONTree(obj[k], q)}
      </div>
    `;
  }

  html += `</div></div>`;
  return html;
}

function toggle(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

/* ===================== HIGHLIGHT ===================== */

function highlight(text, q) {
  if (!q) return text;
  return text.replace(new RegExp(q, "gi"), m => `<mark>${m}</mark>`);
}

function formatValue(v, q) {
  if (typeof v === "string") return `<span class="string">${highlight('"' + v + '"', q)}</span>`;
  if (typeof v === "number") return `<span class="number">${v}</span>`;
  if (typeof v === "boolean") return `<span class="boolean">${v}</span>`;
  return v;
}

/* ===================== PARSE ===================== */

function parseLogs() {
  const input = document.getElementById("input").value;
  const lines = input.split("\n").filter(Boolean);

  logs = lines.map((line, i) => {
    const time = (line.match(/time="([^"]+)"/) || [])[1] || "";
    const msg = (line.match(/msg="([^"]+)"/) || [])[1] || "";
    const status = (line.match(/status="([^"]+)"/) || [])[1] || "";
    const latency = parseFloat((line.match(/latency=([^ ]+)/) || [])[1] || "0");
    const id = (line.match(/id=([^ ]+)/) || [])[1] || i;

    let type = "other";
    if (msg.toLowerCase().includes("request")) type = "request";
    if (msg.toLowerCase().includes("response")) type = "response";

    let health = "ok";
    if (status && !status.startsWith("200")) health = "error";
    if (latency > 500) health = "slow";

    return {
      id,
      time,
      msg,
      status,
      latency,
      type,
      health,
      json: extractJSON(line).map(parseSafeJSON)
    };
  });

  render();
}

/* ===================== RENDER ===================== */

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const output = document.getElementById("output");

  const filtered = logs.filter(l =>
    JSON.stringify(l).toLowerCase().includes(q)
  );

  const grouped = {};
  filtered.forEach(l => {
    const key = l.id || "ungrouped";
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(l);
  });

  document.getElementById("stats").innerHTML = `
    <div class="card">
      Total: ${logs.length} |
      Requests: ${logs.filter(l => l.type === "request").length} |
      Responses: ${logs.filter(l => l.type === "response").length}
    </div>
  `;

  output.innerHTML = Object.entries(grouped).map(([gid, items]) => {

    const collapsed = collapsedGroups.has(gid);

    return `
      <div class="card">

        <div style="display:flex;justify-content:space-between;">
          <b>Group: ${gid}</b>
          <button onclick="toggleGroup('${gid}')">
            ${collapsed ? "Expand" : "Collapse"}
          </button>
        </div>

        ${collapsed ? "" : items.map(l => `
          <div style="margin-top:10px;padding-left:10px;border-left:3px solid #ddd">

            <div><b>${l.time}</b> - ${highlight(l.msg, q)}</div>

            <div>
              Type: ${l.type} |
              Status: ${l.status} |
              Latency: ${l.latency}ms
            </div>

            <div class="${l.health}"><b>${l.health.toUpperCase()}</b></div>

            ${l.json.map((j, idx) => `
              <div style="margin-top:10px">

                <button onclick='copyJSONFromLog("${l.id}", ${idx})'>
                  Copy JSON
                </button>

                <div style="margin-top:10px;padding:10px;background:#0f172a;border-radius:6px;color:white">
                  ${renderJSONTree(j, q)}
                </div>

              </div>
            `).join("")}

          </div>
        `).join("")}

      </div>
    `;
  }).join("");
}

</script>

</body>
</html>
