<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>XkyLog Debugger</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0b1220;
  color: #e5e7eb;
}

header {
  padding: 16px;
  background: #111827;
  font-size: 18px;
  font-weight: bold;
}

.container {
  padding: 16px;
  max-width: 1200px;
  margin: auto;
}

textarea, input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  font-family: monospace;
  background: #111827;
  color: white;
  border: 1px solid #374151;
}

button {
  padding: 10px;
  background: #2563eb;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

.card {
  background: #111827;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #1f2937;
}

.meta {
  font-size: 12px;
  color: #9ca3af;
}

/* JSON styles */
.key { color: #a78bfa; }
.string { color: #34d399; }
.number { color: #fbbf24; }
.boolean { color: #60a5fa; }
.null { color: #ef4444; }

pre {
  margin: 0;
  white-space: pre-wrap;
}
</style>

</head>

<body>

<header>XkyLog Debugger</header>

<div class="container">

<textarea id="input" rows="10" placeholder="Paste logs here..."></textarea>
<button onclick="parseLogs()">Parse Logs</button>

<input id="search" placeholder="Search..." oninput="render()" />

<div id="stats"></div>
<div id="output"></div>

</div>

<script>

let logs = [];

/* ------------------ FIX ESCAPED JSON ------------------ */
function safeParseJSON(str) {
  try {
    return JSON.parse(str);
  } catch {
    try {
      return JSON.parse(str.replace(/\\"/g, '"'));
    } catch {
      return null;
    }
  }
}

/* ------------------ EXTRACT JSON ------------------ */
function extractJSON(text) {
  const results = [];
  let depth = 0, start = -1;

  for (let i = 0; i < text.length; i++) {
    if (text[i] === '{') {
      if (depth === 0) start = i;
      depth++;
    } else if (text[i] === '}') {
      depth--;
      if (depth === 0 && start !== -1) {
        results.push(text.slice(start, i + 1));
      }
    }
  }

  return results;
}

/* ------------------ PARSE LOGS ------------------ */
function parseLogs() {
  const lines = document.getElementById("input").value.split("\n").filter(Boolean);

  logs = lines.map((line, i) => {
    const time = (line.match(/time="([^"]+)"/) || [])[1] || "";
    const msg = (line.match(/msg="([^"]+)"/) || [])[1] || "";
    const status = (line.match(/status="([^"]+)"/) || [])[1] || "";
    const latency = parseFloat((line.match(/latency=([^ ]+)/) || [])[1] || "0");

    let type = "other";
    if (msg.includes("request")) type = "request";
    if (msg.includes("response")) type = "response";

    const jsonBlocks = extractJSON(line)
      .map(safeParseJSON)
      .filter(Boolean);

    return {
      id: i,
      time,
      msg,
      status,
      latency,
      type,
      json: jsonBlocks
    };
  });

  render();
}

/* ------------------ JSON RENDERER (REAL VIEW) ------------------ */
function renderJSON(obj) {
  if (obj === null) return `<span class="null">null</span>`;

  if (typeof obj !== "object") {
    if (typeof obj === "string") return `<span class="string">"${obj}"</span>`;
    if (typeof obj === "number") return `<span class="number">${obj}</span>`;
    if (typeof obj === "boolean") return `<span class="boolean">${obj}</span>`;
    return obj;
  }

  let html = `{<div style="padding-left:15px">`;

  for (const k in obj) {
    html += `
      <div>
        <span class="key">"${k}"</span>: ${renderJSON(obj[k])}
      </div>
    `;
  }

  html += `</div>}`;

  return html;
}

/* ------------------ RENDER ------------------ */
function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const output = document.getElementById("output");

  const filtered = logs.filter(l =>
    JSON.stringify(l).toLowerCase().includes(q)
  );

  document.getElementById("stats").innerHTML = `
    <div class="card">
      Total Logs: ${logs.length} |
      Requests: ${logs.filter(l => l.type === "request").length} |
      Responses: ${logs.filter(l => l.type === "response").length}
    </div>
  `;

  output.innerHTML = filtered.map(l => `
    <div class="card">

      <div class="meta">
        ${l.time} | ${l.type} | ${l.status} | ${l.latency}ms
      </div>

      <div>${l.msg}</div>

      ${l.json.length
        ? l.json.map(j => `
            <div style="margin-top:10px;padding:10px;background:#0f172a;border-radius:6px">
              ${renderJSON(j)}
            </div>
          `).join("")
        : ""
      }

    </div>
  `).join("");
}

</script>

</body>
</html>
